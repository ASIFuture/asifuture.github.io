<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的作品 - 倪致远</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: #fff;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
            gap: 20px;
        }

        .back-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            text-decoration: none;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.12);
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(-5px);
        }
        
        h1 {
            font-size: 2em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        
        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        
        .work-item {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        
        .work-item:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        
        .work-item img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 18px; /* 内部略小一点的R角 */
            object-fit: cover;
        }

        .footer {
            margin-top: 60px;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">← 返回首页</a>
            <h1>我的作品</h1>
        </div>
        
        <div class="works-grid">
            <div class="work-item">
                <img src="works-1.jpg" alt="作品1">
            </div>
            <div class="work-item">
                <img src="works-2.jpg" alt="作品2">
            </div>
            <div class="work-item">
                <img src="works-3.jpg" alt="作品3">
            </div>
            <div class="work-item">
                <img src="works-4.jpg" alt="作品4">
            </div>
            <div class="work-item">
                <img src="works-5.jpg" alt="作品5">
            </div>
        </div>
        
        <div class="footer">
            © 2026 倪致远 · Built with ❤️ by Future
        </div>
    </div>
</body>
</html>
